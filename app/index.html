<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#8b2f2f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="御言葉" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>御言葉台帳</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Yuji+Boku&family=Yuji+Mai&family=Yuji+Syuku&family=Shippori+Mincho:wght@600;700;800&family=Klee+One:wght@600&family=Zen+Kurenaido&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- トップページ：御朱印帳ビュー -->
  <main id="view-home" class="view active">
    <header class="app-header home-header">
      <button class="icon-btn light" id="btn-close-book" aria-label="表紙に戻る" title="表紙に戻る">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M5 4h11a3 3 0 0 1 3 3v13H8a3 3 0 0 1-3-3V4z"/>
          <path d="M8 20a3 3 0 0 1 0-6h11"/>
        </svg>
      </button>
      <button class="text-link gold" id="btn-account" aria-label="アカウント登録">アカウント登録</button>
      <div style="display:flex; gap:4px;">
        <button class="icon-btn light" id="btn-search" aria-label="検索">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true">
            <circle cx="10.5" cy="10.5" r="6.5"/>
            <line x1="15.5" y1="15.5" x2="20" y2="20"/>
          </svg>
        </button>
        <button class="icon-btn light" id="btn-settings" aria-label="設定">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </header>

    <section class="book-area" id="book-area">
      <div class="book" id="book">
        <!-- ページはJSで挿入。右→左にめくる -->
      </div>
      <div class="book-empty" id="book-empty" hidden></div>
      <div class="page-indicator" id="page-indicator"></div>

      <!-- 表紙：タップで開く -->
      <button class="book-cover" id="book-cover" aria-label="御言葉台帳を開く">
        <span class="cover-title">御<br>言<br>葉<br>台<br>帳</span>
      </button>
    </section>

    <!-- 筆（リアルな筆のSVG）— タップで言葉を記す -->
    <button class="brush-btn" id="btn-new" aria-label="新しい言葉を記す">
      <svg viewBox="0 0 80 260" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <linearGradient id="bamboo" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#3a2410"/>
            <stop offset="0.4" stop-color="#7a4a22"/>
            <stop offset="0.55" stop-color="#a87245"/>
            <stop offset="0.8" stop-color="#5a341a"/>
            <stop offset="1" stop-color="#2a1608"/>
          </linearGradient>
          <linearGradient id="cap" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#1a1a1a"/>
            <stop offset="0.5" stop-color="#3a3a3a"/>
            <stop offset="1" stop-color="#0a0a0a"/>
          </linearGradient>
          <linearGradient id="bristleGrad" x1="0.5" y1="0" x2="0.5" y2="1">
            <stop offset="0" stop-color="#f4e9c8"/>
            <stop offset="0.3" stop-color="#d8c08a"/>
            <stop offset="0.65" stop-color="#3a2410"/>
            <stop offset="0.9" stop-color="#0a0604"/>
            <stop offset="1" stop-color="#000"/>
          </linearGradient>
          <radialGradient id="ferrule" cx="0.5" cy="0.4" r="0.6">
            <stop offset="0" stop-color="#f0d68a"/>
            <stop offset="0.5" stop-color="#a8842c"/>
            <stop offset="1" stop-color="#5a3e10"/>
          </radialGradient>
        </defs>
        <!-- 紐ループ（吊り紐） -->
        <path d="M40 4 Q34 14 40 22 Q46 14 40 4 Z" fill="none" stroke="#c8a058" stroke-width="1.5"/>
        <!-- 黒キャップ -->
        <rect x="30" y="20" width="20" height="14" rx="2" fill="url(#cap)"/>
        <!-- 竹軸 -->
        <rect x="32" y="34" width="16" height="140" fill="url(#bamboo)"/>
        <!-- 竹の節 -->
        <ellipse cx="40" cy="70" rx="9" ry="2.5" fill="#1f120a" opacity="0.6"/>
        <ellipse cx="40" cy="120" rx="9" ry="2.5" fill="#1f120a" opacity="0.6"/>
        <ellipse cx="40" cy="160" rx="9" ry="2.5" fill="#1f120a" opacity="0.6"/>
        <!-- 金の口金 -->
        <rect x="29" y="172" width="22" height="10" rx="1" fill="url(#ferrule)" stroke="#3a2a08" stroke-width="0.5"/>
        <rect x="29" y="180" width="22" height="3" fill="#5a3e10"/>
        <!-- 穂（毛先）— 太→細の三角形＋濡れた感じのグラデ -->
        <path d="M28 184 Q40 192 52 184 L48 200 Q44 220 40 252 Q36 220 32 200 Z"
              fill="url(#bristleGrad)" stroke="#1a0e05" stroke-width="0.4"/>
        <!-- 穂のハイライト（左側） -->
        <path d="M34 188 Q36 210 38 240" fill="none" stroke="#fff5d8" stroke-width="0.6" opacity="0.5"/>
        <!-- 墨の滴 -->
        <ellipse cx="40" cy="256" rx="2" ry="2.5" fill="#0a0604"/>
      </svg>
    </button>
  </main>

  <!-- 設定画面 -->
  <section id="view-settings" class="view">
    <header class="app-header">
      <button class="icon-btn light" id="btn-settings-back" aria-label="戻る">←</button>
      <h2 class="brand small gold">設定</h2>
      <span style="width:36px"></span>
    </header>
    <div class="settings">
      <section class="settings-group">
        <h3>アカウント</h3>
        <button class="settings-row" id="settings-account">
          <span>アカウント登録 / ログイン</span><span class="chev">›</span>
        </button>
      </section>

      <section class="settings-group">
        <h3>データ</h3>
        <button class="settings-row" id="settings-export">
          <span>言葉を書き出す（JSON）</span><span class="chev">›</span>
        </button>
        <button class="settings-row danger" id="settings-clear">
          <span>すべての言葉を削除</span><span class="chev">›</span>
        </button>
      </section>

      <section class="settings-group">
        <h3>通知</h3>
        <label class="settings-row" style="cursor:pointer;">
          <span>毎朝8時に今日の言葉</span>
          <input type="checkbox" id="settings-notify-toggle" />
        </label>
      </section>

      <section class="settings-group">
        <h3>サポート</h3>
        <a class="settings-row" href="https://suzukimika0410-cmd.github.io/okotoba-landing/" target="_blank" rel="noopener">
          <span>ヘルプ・お問い合わせ</span><span class="chev">↗</span>
        </a>
        <a class="settings-row" href="https://suzukimika0410-cmd.github.io/okotoba-landing/privacy.html" target="_blank" rel="noopener">
          <span>プライバシーポリシー</span><span class="chev">↗</span>
        </a>
        <a class="settings-row" href="https://suzukimika0410-cmd.github.io/okotoba-landing/terms.html" target="_blank" rel="noopener">
          <span>利用規約</span><span class="chev">↗</span>
        </a>
      </section>

      <p class="settings-version">御言葉台帳 v<span id="app-version">1.0.0</span> (1)</p>
    </div>
  </section>

  <!-- アカウント登録画面 -->
  <section id="view-account" class="view">
    <header class="app-header account-header">
      <button class="icon-btn light" id="btn-account-back" aria-label="戻る">←</button>
      <span></span>
      <span style="width:36px"></span>
    </header>

    <div class="account-hero">
      <div class="account-emblem" aria-hidden="true"><span>御</span></div>
      <h2 class="account-title">御言葉台帳へようこそ</h2>
      <p class="account-lede">
        言葉は、心の足跡。<br>
        登録すると、端末を超えて言葉を保管できます。
      </p>
    </div>

    <form class="account-form" id="form-account">
      <button type="button" class="btn-apple" id="btn-apple">
        <svg viewBox="0 0 16 16" width="18" height="18" aria-hidden="true">
          <path fill="currentColor" d="M11.182.008C11.148-.03 9.923.023 8.857 1.18c-1.066 1.156-.902 2.482-.878 2.516.024.034 1.52.087 2.475-1.258.955-1.345.762-2.391.728-2.43Zm3.314 11.733c-.048-.096-2.325-1.234-2.113-3.422.212-2.189 1.675-2.789 1.698-2.854.023-.064-.597-.79-1.254-1.157a3.692 3.692 0 0 0-1.563-.434c-.108-.003-.483-.095-1.254.116-.508.139-1.653.589-1.968.607-.316.018-1.256-.522-2.267-.665-.647-.125-1.333.131-1.824.328-.49.196-1.422.754-2.074 2.237-.652 1.484-.311 3.834.93 5.392 1.243 1.557 1.999 1.881 2.5 1.917.5.036 1.05-.1 1.74-.39.69-.292 1.74-.452 2.4-.452.66 0 1.71.16 2.4.452.69.29 1.24.426 1.74.39.501-.036 1.257-.36 2.5-1.917.598-.769 1.06-1.591 1.41-2.148Z"/>
        </svg>
        <span>Appleで続ける</span>
      </button>

      <div class="divider"><span>または</span></div>

      <label class="field">
        <span class="label-text">お名前（任意）</span>
        <input type="text" id="acct-name" placeholder="蘇我 美佳" autocomplete="name" />
      </label>
      <label class="field">
        <span class="label-text">メールアドレス</span>
        <input type="email" id="acct-email" placeholder="you@example.com" autocomplete="email" required />
      </label>
      <label class="field">
        <span class="label-text">パスワード</span>
        <input type="password" id="acct-password" placeholder="8文字以上" autocomplete="new-password" minlength="8" required />
        <span class="hint">英数字を含めると安全です。</span>
      </label>

      <label class="checkbox">
        <input type="checkbox" id="acct-terms" required />
        <span><a href="#">利用規約</a>と<a href="#">プライバシーポリシー</a>に同意します</span>
      </label>

      <button type="submit" class="btn-gold">
        <span>御言葉を始める</span>
      </button>

      <p class="account-foot">
        既にアカウントをお持ちの方は
        <a href="#" id="link-signin">ログイン</a>
      </p>
    </form>
  </section>

  <!-- 入力画面 -->
  <section id="view-input" class="view">
    <header class="app-header">
      <button class="icon-btn" id="btn-back" aria-label="戻る">←</button>
      <h2 class="brand small">言葉を記す</h2>
      <button class="text-btn" id="btn-save">保存</button>
    </header>

    <form id="form-entry" class="form">
      <label class="field">
        <span class="label-text">言葉</span>
        <textarea id="input-text" rows="6" placeholder="心に残った言葉を書き留める…" required></textarea>
      </label>

      <div class="row">
        <button type="button" class="chip" id="btn-mic">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="9" y="3" width="6" height="11" rx="3"/>
            <path d="M5 11a7 7 0 0 0 14 0"/>
            <line x1="12" y1="18" x2="12" y2="22"/>
          </svg>
          <span>音声入力</span>
        </button>
        <label class="chip" for="input-photo">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 7h4l2-2h6l2 2h4v12H3z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          <span>写真を添付</span>
        </label>
        <input id="input-photo" type="file" accept="image/*" capture="environment" hidden />
      </div>

      <div class="photo-preview" id="photo-preview" hidden>
        <img id="photo-img" alt="添付写真" />
        <button type="button" class="text-btn small" id="btn-remove-photo">削除</button>
      </div>

      <fieldset class="field">
        <legend class="label-text">どこから来た言葉？</legend>
        <div class="segmented">
          <label><input type="radio" name="category" value="自分" checked /><span>自分</span></label>
          <label><input type="radio" name="category" value="他人" /><span>他人</span></label>
          <label><input type="radio" name="category" value="メディア" /><span>メディア</span></label>
        </div>
      </fieldset>

      <label class="field">
        <span class="label-text">出典・話し手（任意）</span>
        <input id="input-source" type="text" placeholder="例：祖母／○○という本／映画◯◯" />
      </label>

      <div class="ai-section" id="ai-section" hidden>
        <h3>AIによる読み解き</h3>
        <div class="ai-block">
          <h4>コンテキスト解説</h4>
          <p id="ai-context">—</p>
        </div>
        <div class="ai-block">
          <h4>似た言葉</h4>
          <ul id="ai-similar"></ul>
        </div>
      </div>

      <p class="mic-status muted" id="mic-status"></p>
    </form>
  </section>

  <script src="seed.js"></script>
  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(console.warn);
      });
    }
  </script>
</body>
</html>
